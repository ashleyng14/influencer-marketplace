<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fbfaf7" />
  <title>Aurea — Influencer Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            display: ["Fraunces", "Georgia", "serif"],
          },
          colors: {
            ink: { DEFAULT: "#1d1d1f", soft: "#6e6e73", faint: "#86868b" },
            gold: {
              50: "#fbf8f1", 100: "#f7f0e1", 200: "#efe2c4", 300: "#e3ce9c",
              400: "#d4b775", 500: "#c6a45a", 600: "#b08d43", 700: "#8f7035",
              800: "#6f5628", 900: "#4f3d1c",
            },
            canvas: "#fbfaf7",
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: "Inter", system-ui, sans-serif; background: #fbfaf7; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: "Fraunces", Georgia, serif; }

    /* Scroll-reveal */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
    .reveal.in { opacity: 1; transform: none; }
    .reveal[data-delay="1"] { transition-delay: .08s; }
    .reveal[data-delay="2"] { transition-delay: .16s; }
    .reveal[data-delay="3"] { transition-delay: .24s; }
    .reveal[data-delay="4"] { transition-delay: .32s; }
    .reveal[data-delay="5"] { transition-delay: .40s; }

    .gold-text { background: linear-gradient(120deg, #b08d43, #e3ce9c 45%, #b08d43); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero-glow { background: radial-gradient(60% 50% at 50% 0%, rgba(212,183,117,.28) 0%, rgba(212,183,117,0) 70%); }
    .card-hover { transition: transform .5s cubic-bezier(.16,1,.3,1), box-shadow .5s cubic-bezier(.16,1,.3,1); }
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 24px 60px -24px rgba(143,112,53,.35); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    ::selection { background: #efe2c4; }

    /* Marquee for the platform strip */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee { animation: marquee 24s linear infinite; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="sticky top-0 z-40 backdrop-blur-xl bg-canvas/70 border-b border-gold-200/60">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <button onclick="navigate('landing')" class="flex items-center gap-2.5 font-display text-xl tracking-tight">
        <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-gradient-to-br from-gold-400 to-gold-600 text-white text-sm font-sans font-semibold">A</span>
        Aurea
      </button>
      <nav id="nav-links" class="hidden md:flex items-center gap-1 text-[13px] font-medium text-ink-soft"></nav>
      <button onclick="navigate('landing')" class="text-[13px] font-medium text-ink-soft hover:text-ink transition">Switch role</button>
    </div>
  </header>

  <main id="app"></main>

  <div id="modal-root"></div>

  <footer class="border-t border-gold-200/60 py-10 text-center">
    <p class="font-display text-lg">Aurea</p>
    <p class="mt-1 text-xs text-ink-faint">Prototype · mock data for demonstration only</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
